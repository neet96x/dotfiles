# 1. การตั้งค่าพื้นฐาน
set -g default-terminal "tmux-256color"
set -g mouse on               # เปิดใช้งานเมาส์
set -s escape-time 0          # ลดความหน่วงเวลากดปุ่ม

# 3. การจัดการหน้าต่าง (Panes)
bind | split-window -h        # แบ่งหน้าจอแนวนอน
bind - split-window -v        # แบ่งหน้าจอแนวตั้ง

# 4. การตั้งค่า Status Bar (ส่วนที่คุณต้องการ)
set -g status-interval 2      # อัปเดตข้อมูลทุก 2 วินาที
set -g status-bg black        # สีพื้นหลังแถบสถานะ
set -g status-fg white        # สีตัวอักษร

# ตั้งค่า Status ด้านขวา (แสดง RAM + CPU + เวลา)
# -a 0 คือการปิด Load Average ตามที่คุณต้องการ
set -g status-right-length 60
set -g status-right "#[fg=green]#(tmux-mem-cpu-load --interval 2 -a 0) #[fg=white]| %H:%M %d-%b"

# 5. การตั้งค่าหน้าต่าง (Window)
set -g window-status-current-style bg=blue,fg=white
